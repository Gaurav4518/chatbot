<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MedAI | Premium Medical Assistant</title>
	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<!-- JQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<!-- Custom CSS -->
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
</head>

<body>
	<div class="container-fluid">
		<div class="chat-wrapper">
			<!-- Header -->
			<header class="chat-header">
				<div class="bot-avatar-container">
					<img src="{{ url_for('static', filename='avatar.png') }}"
						onerror="this.src='https://cdn-icons-png.flaticon.com/512/387/387569.png'" alt="Medical Bot"
						class="bot-avatar">
					<span class="status-indicator"></span>
				</div>
				<div class="header-info">
					<h2>MedAI Assistant</h2>
					<p>Clinical Intelligence v1.0 • Online</p>
				</div>
			</header>

			<!-- Chat Messages -->
			<main id="messageFormeight" class="chat-body">
				<div class="message-bot message">
					<div class="bubble bubble-bot">
						Hello! I am your MedAI assistant. I can help you understand medical conditions, treatments, and
						general health information. How can I assist you today?
						<span class="time">Just now</span>
					</div>
				</div>
			</main>

			<!-- Footer / Input -->
			<footer class="chat-footer">
				<form id="messageArea">
					<div class="input-container">
						<!-- File Upload -->
						<div class="upload-controls">
							<label for="pdf-upload" class="upload-btn" title="Upload Single PDF">
								<i class="fa-solid fa-file-pdf"></i>
							</label>
							<input type="file" id="pdf-upload" accept=".pdf" style="display: none;" />

							<label for="folder-upload" class="upload-btn" title="Upload Folder of PDFs">
								<i class="fa-solid fa-folder-plus"></i>
							</label>
							<input type="file" id="folder-upload" webkitdirectory directory multiple style="display: none;" />
						</div>
						
						<input type="text" id="text" name="msg"
							placeholder="Ask about symptoms, conditions, or treatments..." autocomplete="off"
							required />
						<button type="submit" id="send" class="send-button">
							<i class="fa-solid fa-paper-plane"></i>
						</button>
					</div>
				</form>
				<div id="upload-status" class="upload-status"></div>
			</footer>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			function scrollToBottom() {
				var chatBody = document.getElementById("messageFormeight");
				chatBody.scrollTop = chatBody.scrollHeight;
			}

			// File Upload Logic
			$("#pdf-upload").on("change", function () {
				var file = this.files[0];
				if (!file) return;

				var formData = new FormData();
				formData.append("file", file);

				$("#upload-status").text("⏳ Indexing PDF... Please wait (this may take a minute)").fadeIn();
				$(".upload-btn").css("opacity", "0.5").css("pointer-events", "none");

				$.ajax({
					url: "/upload",
					type: "POST",
					data: formData,
					processData: false,
					contentType: false,
					success: function (response) {
						$("#upload-status").text("✅ " + response).addClass("success");
						setTimeout(() => {
							$("#upload-status").fadeOut(() => {
								$("#upload-status").removeClass("success").text("");
							});
							$(".upload-btn").css("opacity", "1").css("pointer-events", "auto");
						}, 5000);
					},
					error: function () {
						$("#upload-status").text("❌ Upload failed. Please try again.").addClass("error");
						$(".upload-btn").css("opacity", "1").css("pointer-events", "auto");
					}
				});
			});

			// Folder Upload Logic
			$("#folder-upload").on("change", function () {
				var files = this.files;
				if (files.length === 0) return;

				var formData = new FormData();
				for (var i = 0; i < files.length; i++) {
					formData.append("files[]", files[i]);
				}

				$("#upload-status").text("⏳ Indexing Folder... Please wait").fadeIn();
				$(".upload-btn").css("opacity", "0.5").css("pointer-events", "none");

				$.ajax({
					url: "/upload_folder",
					type: "POST",
					data: formData,
					processData: false,
					contentType: false,
					success: function (response) {
						$("#upload-status").text("✅ " + response).addClass("success");
						setTimeout(() => {
							$("#upload-status").fadeOut(() => {
								$("#upload-status").removeClass("success").text("");
							});
							$(".upload-btn").css("opacity", "1").css("pointer-events", "auto");
						}, 5000);
					},
					error: function () {
						$("#upload-status").text("❌ Folder upload failed.").addClass("error");
						$(".upload-btn").css("opacity", "1").css("pointer-events", "auto");
					}
				});
			});

			$("#messageArea").on("submit", function (event) {
				event.preventDefault();

				const date = new Date();
				const str_time = date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
				var rawText = $("#text").val();

				// User Message
				var userHtml = `
                    <div class="message message-user">
                        <div class="bubble bubble-user">
                            ${rawText}
                            <span class="time">${str_time}</span>
                        </div>
                    </div>
                `;

				$("#text").val("");
				$("#messageFormeight").append(userHtml);
				scrollToBottom();

				// AJAX Request
				$.ajax({
					data: { msg: rawText },
					type: "POST",
					url: "/get",
				}).done(function (data) {
					var botHtml = `
                        <div class="message message-bot">
                            <div class="bubble bubble-bot">
                                ${data}
                                <span class="time">${str_time}</span>
                            </div>
                        </div>
                    `;
					$("#messageFormeight").append(botHtml);
					scrollToBottom();
				});
			});
		});
	</script>
</body>

</html>
